                    - link "Son ileti":
                      - /url: /topic/117/öğrenci-belgesi-ve-transkript-nereden-alınır-en-hızlı-yol/1
                    - text: "Staj başvurusu, burs, askerlik tecili, vize derken sürekli \"öğrenci belgesi\" ya da \"transkript\" isteniyor ve çoğu kişi hâlâ öğrenci işlerine gidip sırada bekliyor. Gerek yok. En hızlısı e-Devlet. turkiye.gov.tr'ye girip YÖK'ün \"Öğrenci Belgesi Sorgulama\" ve \"Transkript Belgesi Sorgulama\" hizmetlerinden belgeyi anında oluşturup PDF indirebiliyorsun. Bu belgelerin üstünde karekod oluyor ve ıslak imza olmasa da resmi kurumların çoğu (bankalar, çoğu şirket, çoğu resmi işlem) bunu kabul ediyor. Saniyeler sürüyor. Bazı yerler ıslak imzalı/mühürlü orijinal belge istiyorsa, o zaman DEBİS üzerinden talep açıyorsun. Burada küçük bir incelik var: belgeyi alacağın günden en az 2 iş günü önce başvurman gerekiyor, anında çıkmıyor. O yüzden ıslak imzalı belge lazım olacağını biliyorsan son güne bırakma. Pratik kural: önce e-Devlet'i dene, isteyen yer \"olmaz, ıslak imzalı olsun\" derse DEBİS'ten talep aç. Bu ikisini bilince öğrenci işleri kuyruğuna neredeyse hiç girmezsin. DEÜ'nün belge duyurusu: https://eng.deu.edu.tr/tr/duyurular/belge-talepleri-duyurusu/"
